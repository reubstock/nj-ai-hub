<head>
  <meta charset="UTF-8" />

  <style>
    .admin-wrap { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    .admin-form { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 2rem; margin-bottom: 3rem; }
    .field { margin-bottom: 1.25rem; }
    .field label { display: block; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    .field input, .field textarea { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14); border-radius: 8px; color: #fff; font-size: 0.95rem; padding: 0.6rem 0.85rem; outline: none; font-family: inherit; transition: border-color 0.15s; }
    .field input:focus, .field textarea:focus { border-color: rgba(74,144,217,0.7); }
    .field textarea { resize: vertical; min-height: 90px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .geocode-btn { margin-top: 0.4rem; background: rgba(74,144,217,0.15); border: 1px solid rgba(74,144,217,0.3); color: #4a90d9; font-size: 0.8rem; font-weight: 600; padding: 0.35rem 0.8rem; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
    .geocode-btn:hover { background: rgba(74,144,217,0.25); }
    .geocode-status { font-size: 0.78rem; color: var(--muted); margin-top: 0.3rem; min-height: 1.1em; }
    .photo-preview { margin-top: 0.5rem; border-radius: 8px; overflow: hidden; max-height: 160px; display: none; }
    .photo-preview img { width: 100%; height: 160px; object-fit: cover; display: block; }
    /* Category select + show-on-map checkbox */
    .field select { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14); border-radius: 8px; color: #fff; font-size: 0.95rem; padding: 0.6rem 0.85rem; outline: none; font-family: inherit; }
    .field select option { background: #0b1d3a; color: #fff; }
    .checkbox-row { display: flex; align-items: center; gap: 0.6rem; cursor: pointer; user-select: none; }
    .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: #f57c00; cursor: pointer; }
    .checkbox-row .checkbox-label { font-size: 0.9rem; color: #fff; }
    .checkbox-row .checkbox-hint  { font-size: 0.78rem; color: var(--muted); margin-left: 0.3rem; }
    /* Category badge in card list */
    .cat-pill { display: inline-block; font-size: 0.66rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.15rem 0.5rem; border-radius: 999px; margin-right: 0.4rem; vertical-align: middle; }
    .map-flag { font-size: 0.72rem; font-weight: 600; padding: 0.15rem 0.5rem; border-radius: 999px; margin-left: 0.4rem; }
    .map-flag.on  { background: rgba(74,222,128,0.16); color: #4ade80; }
    .map-flag.off { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.45); }
    .submit-btn { background: #f57c00; color: #fff; font-weight: 700; font-size: 0.95rem; padding: 0.7rem 1.8rem; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.15s; }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { font-size: 0.88rem; margin-left: 1rem; vertical-align: middle; }
    .msg.ok  { color: #4ade80; }
    .msg.err { color: #f87171; }

    /* Existing cards list */
    .card-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .card-row { display: flex; align-items: center; gap: 1rem; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); border-radius: 10px; padding: 0.75rem 1rem; }
    .card-row img { width: 52px; height: 52px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: rgba(255,255,255,0.08); }
    .card-row-info { flex: 1; min-width: 0; }
    .card-row-name { font-weight: 700; font-size: 0.95rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-row-meta { font-size: 0.78rem; color: var(--muted); margin-top: 0.15rem; }
    .del-btn { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); color: #f87171; font-size: 0.78rem; font-weight: 700; padding: 0.35rem 0.75rem; border-radius: 6px; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
    .del-btn:hover { background: rgba(239,68,68,0.25); }
    .empty-state { color: var(--muted); font-size: 0.92rem; }
  </style>
</head>

<div class="admin-wrap">
  <p class="section-label">Admin</p>
  <h1 class="section-title">Notecard Authoring</h1>
  <div class="section-rule"></div>

  <!-- ── Create form ── -->
  <div class="admin-form">
    <h2 style="font-size:1.1rem;font-weight:700;margin:0 0 1.5rem;color:#fff;">New Notecard</h2>

    <div class="field-row">
      <div class="field">
        <label>Category *</label>
        <select id="f-category">
          <!-- populated from /api/legacy/categories -->
        </select>
      </div>
      <div class="field" style="display:flex;align-items:flex-end;">
        <label class="checkbox-row" style="margin-bottom:0.6rem;">
          <input type="checkbox" id="f-showmap" checked />
          <span class="checkbox-label">Show on homepage map</span>
        </label>
      </div>
    </div>

    <div class="field">
      <label>Name *</label>
      <input id="f-title" type="text" placeholder="e.g. Bell Labs Murray Hill" />
    </div>

    <div class="field">
      <label>Description</label>
      <textarea id="f-desc" placeholder="Brief description shown on the card and detail page…"></textarea>
    </div>

    <div class="field">
      <label>URL (link)</label>
      <input id="f-link" type="url" placeholder="https://…" />
    </div>

    <div class="field">
      <label>Address</label>
      <input id="f-location" type="text" placeholder="e.g. 600 Mountain Ave, Murray Hill, NJ" />
      <button class="geocode-btn" onclick="geocode()">📍 Look up coordinates</button>
      <div class="geocode-status" id="geo-status"></div>
      <div class="field-row" style="margin-top:0.6rem;">
        <div class="field" style="margin:0;">
          <label>Latitude</label>
          <input id="f-lat" type="number" step="0.0001" placeholder="40.3260" />
        </div>
        <div class="field" style="margin:0;">
          <label>Longitude</label>
          <input id="f-lng" type="number" step="0.0001" placeholder="-74.6273" />
        </div>
      </div>
    </div>

    <div class="field">
      <label>Photo URL</label>
      <input id="f-photo" type="url" placeholder="https://…/image.jpg" oninput="previewPhoto()" />
      <div class="photo-preview" id="photo-preview">
        <img id="photo-preview-img" src="" alt="Preview" />
      </div>
    </div>

    <div style="margin-top:1.75rem;">
      <button class="submit-btn" id="submit-btn" onclick="createCard()">Create Notecard</button>
      <span class="msg" id="submit-msg"></span>
    </div>
  </div>

  <!-- ── Existing cards ── -->
  <h2 style="font-size:1.05rem;font-weight:700;margin:0 0 1rem;color:#fff;">Existing Notecards</h2>
  <div id="card-list" class="card-list"><div class="loading">Loading…</div></div>
</div>

<script src="/js/nav.js"></script>
<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  // ── Categories (loaded from /api/legacy/categories) ──
  let CATEGORIES = {};
  async function loadCategories() {
    try {
      const res = await fetch('/api/legacy/categories');
      CATEGORIES = await res.json();
    } catch (e) {
      // fallback if request fails
      CATEGORIES = {
        LEGACY:   { label: 'LEGACY',   color: '#ef4444' },
        RD:       { label: 'R&D',      color: '#4a90d9' },
        STARTUPS: { label: 'STARTUPS', color: '#f57c00' },
        TRAINING: { label: 'TRAINING', color: '#16a34a' },
        POLICY:   { label: 'POLICY',   color: '#a855f7' },
        GRAVITY:  { label: 'GRAVITY',  color: '#f5c518' },
      };
    }
    const sel = document.getElementById('f-category');
    sel.innerHTML = Object.entries(CATEGORIES)
      .map(([key, v]) => `<option value="${key}">${v.label}</option>`).join('');
  }

  // ── Geocode address → lat/lng via OpenStreetMap Nominatim ──
  async function geocode() {
    const addr = document.getElementById('f-location').value.trim();
    if (!addr) return;
    const status = document.getElementById('geo-status');
    status.textContent = 'Looking up…';
    try {
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(addr)}`;
      const res  = await fetch(url, { headers: { 'Accept-Language': 'en' } });
      const data = await res.json();
      if (!data.length) { status.textContent = 'Address not found — enter coordinates manually.'; return; }
      document.getElementById('f-lat').value = parseFloat(data[0].lat).toFixed(5);
      document.getElementById('f-lng').value = parseFloat(data[0].lon).toFixed(5);
      status.textContent = `✓ ${data[0].display_name.slice(0, 80)}`;
    } catch (e) {
      status.textContent = 'Geocode failed — enter coordinates manually.';
    }
  }

  // Allow Enter key in address field to trigger geocode
  document.getElementById('f-location').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); geocode(); }
  });

  // ── Photo preview ──
  function previewPhoto() {
    const url = document.getElementById('f-photo').value.trim();
    const wrap = document.getElementById('photo-preview');
    const img  = document.getElementById('photo-preview-img');
    if (url) { img.src = url; wrap.style.display = 'block'; }
    else      { wrap.style.display = 'none'; }
  }

  // ── Create notecard ──
  async function createCard() {
    const msg = document.getElementById('submit-msg');
    const btn = document.getElementById('submit-btn');
    msg.textContent = '';

    const title = document.getElementById('f-title').value.trim();
    if (!title) { msg.textContent = 'Name is required.'; msg.className = 'msg err'; return; }

    const lat = parseFloat(document.getElementById('f-lat').value);
    const lng = parseFloat(document.getElementById('f-lng').value);
    if (isNaN(lat) || isNaN(lng)) {
      msg.textContent = 'Enter coordinates (use the Look up button).';
      msg.className = 'msg err'; return;
    }

    const payload = {
      title,
      category:    document.getElementById('f-category').value || 'LEGACY',
      showOnMap:   document.getElementById('f-showmap').checked,
      description: document.getElementById('f-desc').value.trim() || undefined,
      link:        document.getElementById('f-link').value.trim()  || undefined,
      location:    document.getElementById('f-location').value.trim() || undefined,
      photo:       document.getElementById('f-photo').value.trim() || undefined,
      lat, lng,
    };

    btn.disabled = true;
    msg.textContent = 'Saving…'; msg.className = 'msg';
    try {
      const res  = await fetch('/api/legacy', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || res.statusText);
      msg.textContent = '✓ Notecard created!'; msg.className = 'msg ok';
      // Clear form
      ['f-title','f-desc','f-link','f-location','f-lat','f-lng','f-photo'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-showmap').checked = true;
      document.getElementById('f-category').selectedIndex = 0;
      document.getElementById('photo-preview').style.display = 'none';
      document.getElementById('geo-status').textContent = '';
      loadCards();
    } catch (e) {
      msg.textContent = 'Error: ' + e.message; msg.className = 'msg err';
    } finally {
      btn.disabled = false;
    }
  }

  // ── Load existing cards ──
  async function loadCards() {
    const list = document.getElementById('card-list');
    try {
      const res   = await fetch('/api/legacy');
      const items = await res.json();
      if (!items.length) { list.innerHTML = '<div class="empty-state">No notecards yet.</div>'; return; }
      list.innerHTML = items.map(c => {
        const cat   = CATEGORIES[c.category] || CATEGORIES.LEGACY;
        const onMap = c.showOnMap !== false; // undefined/missing -> treat as on
        const pillBg = `${cat.color}22`;
        return `
        <div class="card-row" id="crow-${c.id}">
          ${c.photo
            ? `<img src="${c.photo}" alt="${c.title}" onerror="this.style.display='none'" />`
            : `<div style="width:52px;height:52px;border-radius:6px;background:rgba(255,255,255,0.08);flex-shrink:0;"></div>`}
          <div class="card-row-info">
            <div class="card-row-name">
              <span class="cat-pill" style="background:${pillBg};color:${cat.color};">${cat.label}</span>
              ${c.title}
              <span class="map-flag ${onMap ? 'on' : 'off'}" title="Show on homepage map">${onMap ? '● On map' : '○ Off map'}</span>
            </div>
            <div class="card-row-meta">${[c.location, c.lat && c.lng ? `${Number(c.lat).toFixed(3)}, ${Number(c.lng).toFixed(3)}` : ''].filter(Boolean).join(' · ')}</div>
          </div>
          ${c.link ? `<a href="${c.link}" target="_blank" rel="noopener" style="color:#4a90d9;font-size:0.78rem;font-weight:600;text-decoration:none;flex-shrink:0;">View ↗</a>` : ''}
          <button class="del-btn" style="background:rgba(74,144,217,0.12);border-color:rgba(74,144,217,0.25);color:#4a90d9;" onclick="toggleMap(${c.id}, ${onMap ? 'false' : 'true'})">${onMap ? 'Hide on map' : 'Show on map'}</button>
          <button class="del-btn" onclick="deleteCard(${c.id})">Delete</button>
        </div>`;
      }).join('');
    } catch (e) {
      list.innerHTML = '<div class="empty-state">Could not load notecards.</div>';
    }
  }

  // ── Delete card ──
  async function deleteCard(id) {
    if (!confirm('Delete this notecard?')) return;
    try {
      const res = await fetch(`/api/legacy/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('Delete failed');
      document.getElementById(`crow-${id}`)?.remove();
      if (!document.querySelector('.card-row')) {
        document.getElementById('card-list').innerHTML = '<div class="empty-state">No notecards yet.</div>';
      }
    } catch (e) { alert('Could not delete: ' + e.message); }
  }

  // ── Toggle showOnMap ──
  async function toggleMap(id, next) {
    try {
      // PUT requires title to pass server validation — fetch full record first.
      const cur = await (await fetch(`/api/legacy/${id}`)).json();
      const res = await fetch(`/api/legacy/${id}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ ...cur, showOnMap: next }),
      });
      if (!res.ok) throw new Error('Update failed');
      loadCards();
    } catch (e) { alert('Could not update: ' + e.message); }
  }

  // ── Init ──
  loadCategories().then(loadCards);
</script>
