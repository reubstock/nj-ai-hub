<script src="/js/nav.js"></script>
<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const fmtYear = d => d ? new Date(d + 'T00:00:00').getFullYear() : '';

  async function loadDetail() {
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const wrap = document.getElementById('detail-wrap');

    if (!id) {
      wrap.innerHTML = '<div class="empty-state">No entry specified. <a href="/legacy.html">View all legacy entries.</a></div>';
      return;
    }

    try {
      const res = await fetch(`/api/legacy/${id}`);
      if (!res.ok) throw new Error('Not found');
      const item = await res.json();

      document.title = `${item.title} — NJ AI Hub Legacy`;

      wrap.innerHTML = `
        <p class="section-label" style="color:#ef4444;">New Jersey's Innovation Heritage</p>
        <h1 class="section-title" style="margin-bottom:0.4rem;">${item.title}</h1>
        ${item.date || item.location ? `
          <div style="font-size:0.92rem;color:var(--muted);margin-bottom:2rem;">
            ${item.location ? `📍 ${item.location}` : ''}
            ${item.date && item.location ? ' &nbsp;·&nbsp; ' : ''}
            ${item.date ? `Est. ${fmtYear(item.date)}` : ''}
          </div>` : ''}
        <div class="section-rule"></div>

        ${item.photo ? `
          <div style="margin:2rem 0;border-radius:14px;overflow:hidden;max-height:400px;">
            <img src="${item.photo}" alt="${item.title}"
                 style="width:100%;height:400px;object-fit:cover;display:block;" />
          </div>` : ''}

        ${item.description ? `
          <p style="font-size:1.08rem;line-height:1.75;color:var(--text);margin-bottom:2rem;">
            ${item.description}
          </p>` : ''}

        <div style="display:flex;gap:1rem;flex-wrap:wrap;">
          ${item.link ? `
            <a href="${item.link}" target="_blank" rel="noopener" class="btn btn-primary">
              Read more ↗
            </a>` : ''}
          <a href="/legacy.html" class="btn btn-outline">← All Legacy Entries</a>
        </div>
      `;
    } catch (e) {
      wrap.innerHTML = `<div class="empty-state">Could not load entry. <a href="/legacy.html">View all legacy entries.</a></div>`;
    }
  }

  loadDetail();
</script>
