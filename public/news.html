<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const fmtDate = d => d
    ? new Date(d + (d.includes('T') ? '' : 'T00:00:00'))
        .toLocaleDateString('en', { day: 'numeric', month: 'long', year: 'numeric' })
    : '';

  /* ── NJAIC Hub news (local API) ── */
  async function loadHubNews() {
    const el = document.getElementById('news-hub');
    try {
      const res = await fetch('/api/news');
      const items = await res.json();
      if (!items.length) { el.innerHTML = '<div class="empty-state">No news yet.</div>'; return; }
      el.innerHTML = items.map(n => `
        <article class="card" id="n${n.id}">
          <div class="card-image">${n.image ? `<img src="${n.image}" alt="${n.title}" loading="lazy" />` : ''}</div>
          <div class="card-body">
            <div class="card-meta">${fmtDate(n.date)}${n.source ? ' · ' + n.source : ''}</div>
            <h3 class="card-title">${n.title}</h3>
            <p class="card-summary">${n.summary || ''}</p>
            ${n.body ? `<p style="color:var(--muted);font-size:0.92rem;margin:0 0 1rem;">${n.body}</p>` : ''}
            ${n.url ? `<a class="card-link" href="${n.url}" target="_blank" rel="noopener">Read full article</a>` : ''}
          </div>
        </article>
      `).join('');
      if (location.hash) {
        const target = document.querySelector(location.hash);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    } catch (e) {
      console.error(e);
      el.innerHTML = '<div class="empty-state">Failed to load news.</div>';
    }
  }

  /* ── AI Latest (Google News AI topic — proxied via server) ── */
  async function loadAINews() {
    const el = document.getElementById('news-ai');
    try {
      const res  = await fetch('/api/ai-news');
      const items = await res.json();
      if (!Array.isArray(items) || !items.length) throw new Error('empty feed');
      el.innerHTML = items.map(item => `
          <article class="card">
            <div class="card-body">
              <div class="card-meta">${fmtDate(item.pubDate)}${item.source ? ' · ' + item.source : ''}</div>
              <h3 class="card-title">
                <a href="${item.link}" target="_blank" rel="noopener"
                   style="color:inherit;text-decoration:none;">${item.title}</a>
              </h3>
              ${item.description ? `<p class="card-summary">${item.description}…</p>` : ''}
              <a class="card-link" href="${item.link}" target="_blank" rel="noopener">Read article</a>
            </div>
          </article>`).join('');
    } catch (e) {
      console.error(e);
      el.innerHTML = '<div class="empty-state">Could not load feed.</div>';
    }
  }

  loadHubNews();
  loadAINews();
</script>
