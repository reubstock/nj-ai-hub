<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NJ AI Hub — Our Team</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<nav>
  <a href="/" class="nav-brand"><span class="brand-nj">NJ</span><span class="brand-ai">AI</span><span class="brand-hub">HUB</span></a>
  <ul class="nav-links">
    <li><a href="/news.html">News</a></li>
    <li><a href="/events.html">Events</a></li>
    <li class="nav-dropdown">
      <a href="/about.html" class="nav-dropdown-trigger">About <span class="caret">▾</span></a>
      <ul class="nav-dropdown-menu">
        <li><a href="/team.html">Team</a></li>
        <li><a href="/location.html">Location</a></li>
      </ul>
    </li>
    <li><a href="/about.html#contact" class="nav-cta">Contact Us</a></li>
  </ul>
  <button class="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
</nav>

<section class="section">
  <p class="section-label">The People</p>
  <h1 class="section-title">Our Team</h1>
  <div class="section-rule"></div>
  <p class="section-subtitle">The leaders driving the NJ AI Hub forward.</p>

  <div class="team-grid" id="team-list">
    <div class="loading">Loading team…</div>
  </div>
</section>

<footer>
  <div class="footer-inner">
    <div>
      <div class="footer-brand"><span class="nj">NJ</span><span class="ai">AI</span> HUB</div>
      <p class="footer-tagline">Alexander Road, West Windsor, NJ</p>
    </div>
    <ul class="footer-links">
      <li><a href="/news.html">News</a></li>
      <li><a href="/events.html">Events</a></li>
      <li><a href="/location.html">Location</a></li>
      <li><a href="/team.html">Team</a></li>
      <li><a href="/about.html">Contact</a></li>
    </ul>
  </div>
  <div class="footer-bottom">© <span id="year"></span> NJ AI Hub.</div>
</footer>

<script src="/js/nav.js"></script>
<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  function initials(name) {
    return name.split(' ').map(p => p[0]).slice(0, 2).join('').toUpperCase();
  }

  async function loadTeam() {
    const el = document.getElementById('team-list');
    try {
      const res = await fetch('/api/team');
      const items = await res.json();
      if (!items.length) { el.innerHTML = '<div class="empty-state">Team coming soon.</div>'; return; }
      el.innerHTML = items.map(m => `
        <article class="team-card">
          <div class="team-avatar">${initials(m.name)}</div>
          <h3 class="team-name">${m.name}</h3>
          <p class="team-role">${m.role}</p>
          <p class="team-bio">${m.bio || ''}</p>
        </article>
      `).join('');
    } catch (e) { console.error(e); el.innerHTML = '<div class="empty-state">Failed to load team.</div>'; }
  }
  loadTeam();
</script>
</body>
</html>
